<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Etch-a-Sketch!</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <h1>Etch-a-Sketch!</h1>
      <div class="container">
        <div class="control1">
          <button id="rainbow">Rainbow</button>
          <button id="black">Black</button>
          <button id="clear">Clear</button>
          <form id="col">
            <label for="colorInput">Customize</label>
            <input type="color" id="colorInput" name="colorInput" />
          </form>
          <button id="auto">Auto</button>
        </div>
        <div class="box"></div>
        <div class="control2">
          <p id="val">Grid Size: 16 X 16</p>
          <form>
            <label for="slider">Modify to change Grid</label>
            <input type="range" id="slider" min="1" max="100" value="16" />
          </form>
          <button id="create">Create</button>
          <p>
            <em>**NOTE - Opacity changes by .1 after every interaction!**</em>
          </p>
          <p>
            The auto button changes the opacity of all cells whenever pressed!
          </p>
        </div>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
